<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake 🎂</title>

    <link rel="stylesheet" href="cake.css">
</head>
<body>

    <h1>🎉 Happy Birthday 🎉</h1>

    <p>Make a wish and tap the candles!</p>

<div class="cream"></div>

<div class="flowers">
    <span>🌹</span>
    <span>🌸</span>
    <span>🌹</span>
    <span>🌸</span>
</div>

    <div class="cake-top">
        <div class="cream"></div>

        <div class="candles">
    <div class="candle" onclick="blow(this)"></div>
    <div class="candle" onclick="blow(this)"></div>
    <div class="candle" onclick="blow(this)"></div>
    <div class="candle" onclick="blow(this)"></div>
    <div class="candle" onclick="blow(this)"></div>
        </div>

    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>

    <div class="plate"></div>

</div>


    <button id="wishBtn">
        🕯️ Blow Candles
    </button>

<button id="cutBtn" style="display:none;" onclick="cutCake()">
    🔪 Cut the Cake
</button>

    <script src="cake.js"></script>

</body>
</html>
<div id="wishMessage">
    ✨ Make a Wish ✨
</div>

<div id="confetti"></div>
<div id="celebration">
    <div class="heart">💖</div>
    <h2>Happy Birthday!</h2>
    <p>Your wish has been sent to the stars ✨</p>

    <button id="nextBtn" onclick="window.location.href='letter.html'">
        💌 Continue
    </button>
</div>
