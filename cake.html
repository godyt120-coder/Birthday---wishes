<h1>🎉 Happy Birthday 🎉</h1>

<p>Make a wish and tap the candles!</p>

<div id="knife">🔪</div>

<div class="cake">

    <div class="cake-top">

        <div class="flowers">
            <span>🌹</span>
            <span>🌸</span>
            <span>🌹</span>
            <span>🌸</span>
        </div>

        <div class="cream"></div>

        <div class="candles">
            <div class="candle" onclick="blow(this)"></div>
            <div class="candle" onclick="blow(this)"></div>
            <div class="candle" onclick="blow(this)"></div>
            <div class="candle" onclick="blow(this)"></div>
            <div class="candle" onclick="blow(this)"></div>
        </div>

    </div>

    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>

    <div class="plate"></div>

</div>

<div id="wishMessage">
    ✨ Make a Wish ✨
</div>

<button id="cutBtn" style="display:none;" onclick="cutCake()">
    🔪 Cut the Cake
</button>

<div id="celebration">
    <div class="heart">💖</div>
    <h2>Happy Birthday!</h2>
    <p>Your wish has been sent to the stars ✨</p>

    <button id="nextBtn" onclick="window.location.href='letter.html'">
        💌 Continue
    </button>
</div>

<script src="cake.js"></script>
<div id="petals"></div>
<div id="balloons"></div>
<div id="sparkles"></div>
<div id="cats">
    <div class="cat left-cat">🐱</div>
    <div class="cat right-cat">😺</div>
</div>
