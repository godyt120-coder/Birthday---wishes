<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake 🎂</title>

    <link rel="stylesheet" href="cake.css">
</head>
<body>

    <h1>🎉 Happy Birthday 🎉</h1>

    <p>Make a wish and tap the candles!</p>

<div class="cream"></div>

<div class="flowers">
    <span>🌹</span>
    <span>🌸</span>
    <span>🌹</span>
    <span>🌸</span>
</div>

    <div class="cake-top">
        <div class="cream"></div>

        <div class="candles">
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
            <div class="candle"></div>
        </div>
    </div>

    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>

    <div class="plate"></div>

</div>


    <button id="wishBtn">
        🕯️ Blow Candles
    </button>

    <button id="cutBtn" style="display:none;">
        🔪 Cut the Cake
    </button>

    <script src="cake.js"></script>

</body>
</html>
