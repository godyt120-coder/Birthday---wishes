<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake 🎂</title>

    <link rel="stylesheet" href="cake.css">
</head>
<body>

<div class="background">

    <div class="balloon balloon1">🎈</div>
    <div class="balloon balloon2">🎈</div>
    <div class="balloon balloon3">🎈</div>
    <div class="balloon balloon4">🎈</div>

    <div class="sparkles"></div>

</div>

<div class="container">

    <h1>🎂 Happy Birthday 🎂</h1>

    <p class="subtitle">
        Make a wish and blow out the candles!
    </p>

    <div id="knife">🔪</div>

    <div class="cake">

        <div class="cake-top">

            <div class="flowers">
                <span>🌸</span>
                <span>🌹</span>
                <span>🌸</span>
                <span>🌹</span>
                <span>🌸</span>
            </div>

            <div class="cream"></div>

            <div class="candles">

                <div class="candle" onclick="blow(this)">
                    <div class="flame"></div>
                </div>

                <div class="candle" onclick="blow(this)">
                    <div class="flame"></div>
                </div>

                <div class="candle" onclick="blow(this)">
                    <div class="flame"></div>
                </div>

                <div class="candle" onclick="blow(this)">
                    <div class="flame"></div>
                </div>

                <div class="candle" onclick="blow(this)">
                    <div class="flame"></div>
                </div>

            </div>

        </div>
        <div class="cake-middle"></div>

        <div class="cake-bottom"></div>

        <div class="plate"></div>

    </div>

    <div class="buttons">

        <button onclick="blowAllCandles()">
            💨 Blow All Candles
        </button>

        <button onclick="cutCake()">
            🔪 Cut Cake
        </button>

    </div>

    <div id="message">
        🎉 Make a wish and enjoy your special day! 💖
    </div>

    <button id="nextBtn" onclick="window.location.href='letter.html'">
        💌 Open Birthday Letter
    </button>

</div>

<script src="cake.js"></script>

</body>
</html>
